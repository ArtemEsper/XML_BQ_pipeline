name: Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "Dockerfile"
      - "launcher.py"
      - "requirements.txt"
      - "setup.py"
      - "metadata.json"
      - ".github/workflows/deploy.yml"

env:
  PROJECT_ID: xml-bq-wos-analytics
  REGION: us-central1
  AR_REPO: wos-pipeline
  IMAGE_NAME: wos-xml-to-bq
  TEMPLATE_GCS_PATH: gs://xml-bq-wos-analytics-dataflow-temp-dev/templates/wos_pipeline.json
  METADATA_FILE: metadata.json

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE_BASE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}"
          echo "image_tag=${IMAGE_BASE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_BASE}:latest" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-template:
    name: Build Flex Template Spec
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build Flex Template spec
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest"
          gcloud dataflow flex-template build "${{ env.TEMPLATE_GCS_PATH }}" \
            --image="${IMAGE}" \
            --sdk-language=PYTHON \
            --metadata-file="${{ env.METADATA_FILE }}"

      - name: Print template location
        run: echo "Flex Template updated at ${{ env.TEMPLATE_GCS_PATH }}"
